apiVersion: apps/v1
kind: Deployment
metadata:
  name: qk-server
  namespace: gemma
  labels:
    app: qk-server
spec:
  replicas: 0   # starts idle; only one of {gemma-server, qk-server} may hold the GPU at a time
  selector:
    matchLabels:
      app: qk-server
  template:
    metadata:
      labels:
        app: qk-server
        gpu-llm: server   # shared label: the gemma-server Service selects this, so scaling flips traffic
    spec:
      containers:
      - name: qk-server
        image: localhost:32000/qk-server:vulkan
        imagePullPolicy: Always
        args:
        - --model
        - /models/Qwen3.6-35B-A3B-UD-Q3_K_M.gguf
        - --engine-lib
        - /app/libqk.so
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        # slots*ctx KV must fit VRAM beside the ~15.5 GB model: at slots=4/ctx=16384
        # the 20 GB card overcommits and spills to GTT (PCIe) -> ~30x slowdown once
        # long agentic sessions fill their contexts. slots=2 fits with headroom.
        - --slots
        - "2"
        - --ctx
        - "16384"
        - --chunk
        - "8"
        env:
        - name: QK_FORK           # same-prompt requests share one prefill (fork mode)
          value: "1"
        # Batched prefill flushes its command buffer every QK_SUBMIT_LAYERS layers
        # (engine default 8) so no single vkQueueSubmit can outlive amdgpu's ~10 s
        # gfx-ring timeout (the 2026-07-06 VK_ERROR_DEVICE_LOST crash loop). Set
        # QK_NO_BATCH=1 to fall back to serial prefill if device-lost recurs.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: 18Gi
          limits:
            memory: 30Gi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /models
          name: models
          readOnly: true
        - mountPath: /dev/dri
          name: dri
      volumes:
      - hostPath:
          path: /home/ryan/intellij/ggerganov/llama.cpp
          type: Directory
        name: models
      - hostPath:
          path: /dev/dri
          type: Directory
        name: dri
