apiVersion: apps/v1
kind: Deployment
metadata:
  name: qk-server
  namespace: gemma
  labels:
    app: qk-server
spec:
  replicas: 0   # starts idle; scale up via switch.sh (or directly — see below)
  # Since 2026-07-12 this backend is PINNED to the 7900 XTX (1a:00.0, 24 GB)
  # so it can serve concurrently with the 80B split head on the XT (03:00.0).
  # It still carries the gpu-llm: server label (gemma-server Service default)
  # until the both-live cutover; the qk-35b Service reaches it permanently.
  # Recreate, NOT RollingUpdate: two overlapping pods cannot both fit the
  # model in VRAM on ONE card. Under overlap the new pod's weights silently
  # fall back to GTT (host RAM over PCIe) — the server comes up healthy at
  # ~9 tok/s (symptom: vram ~3 GB, gtt ~27 GB). Recreate kills the old
  # pod first so the load always lands in VRAM. (Cross-DEPLOYMENT overlap on
  # the same card has the same hazard — switch.sh cannot see it; drain-check.)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qk-server
  template:
    metadata:
      labels:
        app: qk-server
        # NB deliberately NOT gpu-llm: server since the 2026-07-12 both-live
        # cutover — gemma-server routes to the switched backend (the 80B
        # split); this pod is reached via the dedicated qk-35b Service.
    spec:
      containers:
      - name: qk-server
        image: localhost:32000/qk-server:vulkan
        imagePullPolicy: Always
        args:
        - --model
        - /models/Qwen3.6-35B-A3B-UD-Q3_K_M.gguf
        - --engine-lib
        - /app/libqk.so
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        # slots*ctx KV must fit VRAM beside the ~15.5 GB model (KV is allocated
        # upfront at open, so the open footprint is the whole story). Measured
        # clean-open at slots=2 (2026-07-10): ctx 16384 -> 17.65 GB, 24576 ->
        # 18.28 GB, 32768 -> 18.92 GB (KV ~0.64 GB per 16k per 2 slots).
        # On the 24 GB XTX, ctx 49152 (~19.6 GB projected) gives agent
        # sessions the same trim-loop headroom the 80B got, with ~4 GB spare
        # for co-tenants (voice STT/TTS earmark). Verify VRAM on rollout; if
        # it spills to GTT, drop back to 32768. slots=2 stays (4 spiked).
        - --slots
        - "2"
        - --ctx
        - "49152"
        - --chunk
        - "8"
        env:
        # Pin to the 7900 XTX — with two identical Navi31s, first-discrete
        # enumeration order is a boot-flip away from landing on the 80B
        # head's card. BDF suffix match; needs image >= 2026-07-12 (6135b97).
        - name: QK_DEVICE_PCI
          value: "1a:00.0"
        - name: QK_FORK           # same-prompt requests share one prefill (fork mode)
          value: "1"
        - name: QK_SPEC           # prompt-lookup speculative decoding (exact-output;
          value: "1"              # ~1.5x on echo-heavy turns, neutral otherwise)
        - name: QK_SPEC_LOG       # one [spec] stats line per request that speculated
          value: "1"
        # Prefix-cache depth. Each entry is a HOST (GTT) snapshot of a slot's
        # full KV+recurrent state — ~1.31 GiB at ctx 32768, allocated at open —
        # so this is the pod's dominant host-memory knob (16 was a leftover
        # experiment costing 21 GiB of GTT for nothing; 6 covers a few
        # interleaved sessions' history-boundary snapshots at ~7.9 GiB).
        - name: QK_PCACHE
          value: "6"
        - name: QK_PCACHE_LOG     # one [pcache] reuse-stats line per request
          value: "1"
        - name: QK_MAX_TOOL_CHARS # cap a single tool_result before context-fit trimming
          value: "4000"
        - name: QK_STATS_FILE     # [spec]/[pcache] lines append here and survive pod
          value: "/stats/qk-stats.log"  # restarts (kubectl logs reset on every bounce)
        # RDNA3 tuning (docs/amd-opt/REPORT.md, 2026-07-13) — the 35B common
        # set, all greedy byte-exact (GEN SHA-256 matched the untouched build
        # on both cards). Measured on the XTX: decode 179 tok/s (was ~135),
        # prefill 809 tok/s; deep context no longer decays (GQA-AUTO reuses
        # KV reads across the 4 q-heads per kv-head past a ~2k crossover).
        - name: QK_MAXB
          value: "1024"
        - name: QK_ATTN_CHUNK
          value: "64"
        - name: QK_ATTN_LIVE_DISPATCH
          value: "1"
        - name: QK_ATTN_GQA_AUTO
          value: "1"
        - name: QK_MOE_SELECT_FAST
          value: "1"
        - name: QK_MOE_ROUTE_FUSED
          value: "1"
        - name: QK_MOE_SELECT_HIER
          value: "1"
        - name: QK_MOE_SHARED_GU_64
          value: "1"
        - name: QK_DN_STEP_GATE_FUSED
          value: "1"
        - name: QK_MOE_DOWN_128
          value: "1"
        - name: QK_MOE_SHARED_DOWN_32
          value: "1"
        # Batched prefill flushes its command buffer every QK_SUBMIT_LAYERS layers
        # (engine default 8) so no single vkQueueSubmit can outlive amdgpu's ~10 s
        # gfx-ring timeout (the 2026-07-06 VK_ERROR_DEVICE_LOST crash loop). Set
        # QK_NO_BATCH=1 to fall back to serial prefill if device-lost recurs.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: 18Gi
          limits:
            memory: 30Gi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /models
          name: models
          readOnly: true
        - mountPath: /dev/dri
          name: dri
        - mountPath: /stats
          name: stats
      volumes:
      - hostPath:
          path: /home/ryan/intellij/ggerganov/llama.cpp
          type: Directory
        name: models
      - hostPath:
          path: /dev/dri
          type: Directory
        name: dri
      - hostPath:
          path: /var/lib/qk-stats
          type: DirectoryOrCreate
        name: stats
