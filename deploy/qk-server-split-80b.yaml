# qk-server in SPLIT mode for Qwen3-Next-80B-A3B-Instruct (42.8 GB IQ4_XS-qk
# repack): tron runs the HEAD stage (layers [0,12) ≈ 12 GB VRAM + the whole
# serving brain) and forwards hidden rows to midnight's Metal pipe-worker on
# :18200 (layers [12,48), ~32 GB wired). Same switch.sh contract as the other
# backends: replicas starts at 0, the gemma-server Service selects
# `gpu-llm: server`, and only ONE backend may be scaled up at a time
# (`./switch.sh split80`).
#
# Worker prerequisite on midnight:
#   QK_MLOCK=1 qk pipe-worker 18200 12:48 65536 2
# The worker's slots/ctx must cover the head's; the qkp3 hello enforces it
# loudly at connect (a qkp2-era worker is rejected there — rebuild it when
# bumping this image). Startup ORDER does not matter — the head connects
# lazily and a request against a down worker fails 5xx without killing the
# server. The 35B worker on :18100 is a different process and not involved.
#
# The model lives on the 4 TB volume (/mnt/data/models), NOT the llama.cpp
# models hostPath the 35B backends mount. midnight holds a byte-identical
# copy of the same repack; the qkp2 hello checks shape, not file identity.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qk-server-split-80b
  namespace: gemma
  labels:
    app: qk-server-split-80b
spec:
  replicas: 0   # idle by default; ./switch.sh split80 scales it up
  strategy:
    type: Recreate   # same single-GPU overlap hazard as qk-server.yaml
  selector:
    matchLabels:
      app: qk-server-split-80b
  template:
    metadata:
      labels:
        app: qk-server-split-80b
        gpu-llm: server   # the gemma-server Service routes here when scaled up
    spec:
      containers:
      - name: qk-server-split-80b
        image: localhost:32000/qk-server:vulkan
        imagePullPolicy: Always
        args:
        - --model
        - /models/Qwen3-Next-80B-A3B-Instruct-IQ4_XS-qk.gguf
        - --engine-lib
        - /app/libqk.so
        - --host
        - "0.0.0.0"
        - --port
        - "8080"
        # Head owns layers [0,12): ~10.9 GB weights+embd, plus KV for the 3
        # attention layers in range (268 MB/layer/slot at ctx 65536, linear)
        # — ~12.8 GB VRAM total. ctx raised 32768 -> 65536 on 2026-07-11:
        # claude-code-shaped sessions (~25k system prompt) lived at the old
        # ceiling, and the context-fit trim there makes agents forget what
        # they already ran (repeat-tool-call loops across turns). The 12:48
        # boundary mirrors what the midnight worker serves; the hello
        # rejects any drift.
        - --slots
        - "2"
        - --ctx
        - "49152"
        - --chunk
        - "8"
        - --split-next
        - REDACTED-LAN-IP:18200
        env:
        # Pin the head to the 7900 XTX (24 GB). Since 2026-07-13 the XT
        # (03:00.0) is the AUDIO card (kokoro TTS + whisper STT, coord-2's
        # domain) — LLM backends live on the XTX, one at a time, and the
        # 35B (also XTX-pinned) is a switched alternative to this backend.
        - name: QK_DEVICE_PCI
          value: "1a:00.0"
        - name: QK_LAYERS
          value: "0:12"
        # Snapshot ENTRY COUNT for split cross-turn reuse (qk_state_n). Each
        # entry is a host snapshot bounded to its LIVE token count (worst case ~0.6 GiB at ctx
        # 49152: 3 attn layers + DN share; typical agent turns are far less).
        # The midnight worker is launched with the SAME count (QK_PCACHE=6).
        # 4 -> 6 (2026-07-12): burn2 showed 2 concurrent sessions x per-turn
        # saves + side-requests LRU-thrash 4 entries into full-history cold
        # re-prefills (~45-60s/turn); 6 covers the observed working set.
        - name: QK_PCACHE
          value: "6"
        - name: QK_PCACHE_LOG
          value: "1"
        - name: QK_STATS_FILE
          value: /stats/qk-stats.log
        # Sampling policy (task #44): requests that OMIT temperature sample
        # at 0.7 — this is what breaks deterministic greedy agent loops for
        # clients that send no temperature at all. Explicit values are
        # honored but clamped to 0.8; explicit 0 stays greedy, so token
        # gates pin "temperature": 0 and remain exact. Sampling runs on the
        # head; the qkp3 worker ships top-k candidates for sampled tokens.
        - name: QK_TEMP_DEFAULT
          value: "0.7"
        - name: QK_TEMP_CAP
          value: "0.8"
        # RDNA3 tuning (docs/amd-opt/REPORT.md, 2026-07-13). Head runs on the
        # XTX, so this is the report's 80B XTX card-best set: live split-K
        # dispatch + GQA-aware attention, fused MoE route, fast standalone
        # selector, fused DN step+gate, 128-lane IQ4 down. Each is greedy
        # byte-exact (hidden-row hashes matched the untouched build on both
        # cards). Measured: head stage decode 640 tok/s, prefill 1904 tok/s.
        - name: QK_MAXB
          value: "256"
        - name: QK_ATTN_CHUNK
          value: "64"
        - name: QK_ATTN_LIVE_DISPATCH
          value: "1"
        - name: QK_ATTN_GQA_AUTO
          value: "1"
        - name: QK_MOE_SELECT_FAST
          value: "1"
        - name: QK_MOE_ROUTE_FUSED
          value: "1"
        - name: QK_DN_STEP_GATE_FUSED
          value: "1"
        - name: QK_MOE_DOWN_128
          value: "1"
        # NB: QK_FORK / QK_SPEC are unsupported in split mode v1 (the server
        # warns and they never engage) — deliberately unset here.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: 8Gi
          limits:
            memory: 16Gi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /models
          name: models
          readOnly: true
        - mountPath: /dev/dri
          name: dri
        - mountPath: /stats
          name: stats
      volumes:
      - hostPath:
          path: /mnt/data/models
          type: Directory
        name: models
      - hostPath:
          path: /dev/dri
          type: Directory
        name: dri
      - hostPath:
          path: /var/lib/qk-stats
          type: DirectoryOrCreate
        name: stats
